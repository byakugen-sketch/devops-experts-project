apiVersion: batch/v1
kind: CronJob
metadata:
  name: flask-healthcheck           # Name of the CronJob
spec:
  schedule: "*/1 * * * *"          # Runs every minute
  concurrencyPolicy: Forbid         # Don't start a new job if the previous one is still running
                                    # Other options: Allow (default), Replace
  successfulJobsHistoryLimit: 3     # Keep logs of last 3 successful runs
  failedJobsHistoryLimit: 3         # Keep logs of last 3 failed runs
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure  # Retry the pod if it fails (required for CronJob pods)
          containers:
            - name: healthcheck
              image: busybox:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Running health check at $(date)"
                  RESPONSE=$(wget -q -O- http://flask-service:80)
                  echo "Response: $RESPONSE"
                  if [ "$RESPONSE" = "Hello, Doron!" ]; then
                    echo "Health check PASSED"
                  else
                    echo "Health check FAILED"
                    exit 1
                  fi
