apiVersion: batch/v1
kind: CronJob
metadata:
  name: flask-cleanup
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: busybox:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Running cleanup task at $(date)"
                  rm -rf /tmp/*
                  echo "Cleanup complete"
