apiVersion: apps/v1        # The Kubernetes API version for Deployments
kind: Deployment           # The type of resource we're creating
metadata:
  name: flask-app          # Name of this Deployment inside the cluster
  labels:
    app: flask-app         # Label used to identify and group related resources
spec:
  replicas: 2              # Run 2 identical pods for basic availability
  selector:
    matchLabels:
      app: flask-app       # The Deployment manages pods with this label
  template:                # Blueprint for each pod the Deployment creates
    metadata:
      labels:
        app: flask-app     # Must match the selector above
    spec:
      containers:
        - name: flask-app                                        # Name of the container inside the pod
          image: uzumaki420/devops-experts-project:latest       # Docker Hub image to pull
          ports:
            - containerPort: 5000                               # Port the Flask app listens on
          envFrom:
            - configMapRef:
                name: flask-config                             # Injects all keys from ConfigMap as env vars
          env:
            - name: SECRET_KEY                                 # Injected individually from the Secret
              valueFrom:
                secretKeyRef:
                  name: flask-secret
                  key: SECRET_KEY
          livenessProbe:
            httpGet:
              path: /health                                     # Endpoint to probe
              port: 5000
            initialDelaySeconds: 10                            # Wait 10s before first check (app needs time to start)
            periodSeconds: 10                                  # Check every 10 seconds
            failureThreshold: 3                                # Restart pod after 3 consecutive failures
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5                             # Check readiness sooner than liveness
            periodSeconds: 5                                   # Check more frequently - affects traffic routing
            failureThreshold: 3                                # Remove from load balancer after 3 failures
          resources:
            requests:
              cpu: "100m"                                       # Baseline CPU this pod is guaranteed (100 millicores = 0.1 CPU)
            limits:
              cpu: "200m"                                       # Max CPU this pod can use before being throttled
